name: AI Dev OS Full CI/CD

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.10

    - name: Install dependencies
      run: uv sync --all-groups

    - name: Run Tests
      env:
        ANTHROPIC_API_KEY: "dummy_key_for_ci_tests"
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/src
        uv run pytest --cov=src --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
      if: always()

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.10

    - name: Install dependencies
      run: uv sync --all-groups

    - name: Check code style (Black)
      run: uv run black --check src/ || true

    - name: Sort imports (isort)
      run: uv run isort --check src/ || true

    - name: Lint (flake8)
      run: uv run flake8 src/ --max-line-length=100 --ignore=E501 || true

  type-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.10

    - name: Install dependencies
      run: uv sync --all-groups

    - name: Type checking (mypy)
      run: uv run mypy src/ --ignore-missing-imports || true

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.10

    - name: Install dependencies
      run: uv sync --all-groups

    - name: Security check (bandit)
      run: uv run bandit -r src/ -ll || true
